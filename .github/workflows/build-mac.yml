name: Build Mac App

on:
  push:
    branches: [poko-server, main]
    paths:
      - "client/**"
      - ".github/workflows/build-mac.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon (arm64)
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python (for PyInstaller sidecar)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compute version from commit
        id: version
        env:
          GITHUB_SHA_ENV: ${{ github.sha }}
        run: |
          # Monotonic semver: 0.1.<yymmddHHMM> → e.g. 0.1.2604161800
          # (10-digit patch, always increasing)
          STAMP=$(date -u +'%y%m%d%H%M')
          VERSION="0.1.${STAMP}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA_ENV:0:7}" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Patch version into tauri.conf.json + Cargo.toml
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 <<PY
          import json, os, re
          v = os.environ["APP_VERSION"]
          # tauri.conf.json
          p = "client/src-tauri/tauri.conf.json"
          with open(p) as f: d = json.load(f)
          d["version"] = v
          with open(p, "w") as f: json.dump(d, f, indent=2)
          # Cargo.toml
          p = "client/src-tauri/Cargo.toml"
          with open(p) as f: s = f.read()
          s = re.sub(r'^version\s*=\s*"[^"]+"', f'version = "{v}"', s, count=1, flags=re.M)
          with open(p, "w") as f: f.write(s)
          PY

      - name: Install Python sidecar dependencies
        working-directory: client/sidecar
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller gradescopeapi==1.8.0 beautifulsoup4 requests python-dotenv

      - name: Build sidecar binary
        working-directory: client/sidecar
        run: |
          pyinstaller --onefile --name poko-sidecar sidecar_main.py
          mkdir -p ../src-tauri/binaries
          cp dist/poko-sidecar ../src-tauri/binaries/poko-sidecar-aarch64-apple-darwin
          chmod +x ../src-tauri/binaries/poko-sidecar-aarch64-apple-darwin

      - name: Install client deps
        working-directory: client
        run: bun install

      - name: Build Tauri app (signed updater bundle)
        working-directory: client
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Ad-hoc sign the .app so Gatekeeper shows "unidentified developer"
          # instead of the hard-block "damaged" error on fresh downloads.
          # (Real notarization requires $99/yr Apple Developer membership.)
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          bun run build
          bun run tauri build

      - name: Verify ad-hoc signature on .app bundle
        run: |
          # Just verify — don't re-sign here, because the .app.tar.gz and its
          # minisign signature are already generated from the .app at this point.
          # Re-signing would break the updater signature.
          APP=$(find client/src-tauri/target/release/bundle/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP" ]; then echo "ERROR: no .app bundle found"; exit 1; fi
          echo "Verifying ad-hoc signature on $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "Signature OK."

      - name: Generate latest.json manifest for auto-updater
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          SHA_SHORT: ${{ steps.version.outputs.short_sha }}
          REPO: ${{ github.repository }}
        run: |
          BUNDLE_DIR="client/src-tauri/target/release/bundle"
          # Tauri v2 emits: macos/Poko.app.tar.gz and .sig for the updater
          TARBALL=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" | head -1)
          SIGFILE="${TARBALL}.sig"

          if [ -z "$TARBALL" ] || [ ! -f "$SIGFILE" ]; then
            echo "ERROR: updater artifacts not found"
            ls -R "$BUNDLE_DIR"
            exit 1
          fi

          SIG_CONTENT=$(cat "$SIGFILE")
          PUB_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          # The updater URL uses the release tag "latest-mac"
          UPDATER_URL="https://github.com/${REPO}/releases/download/latest-mac/Poko.app.tar.gz"

          cat > latest.json <<EOF
          {
            "version": "${APP_VERSION}",
            "notes": "Poko build ${SHA_SHORT}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_CONTENT}",
                "url": "${UPDATER_URL}"
              },
              "darwin-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "${UPDATER_URL}"
              }
            }
          }
          EOF

          # Copy artifacts to predictable names
          cp "$TARBALL" "Poko.app.tar.gz"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "Poko-mac.dmg"
          fi

          echo "Artifacts ready:"
          ls -lh Poko.app.tar.gz Poko-mac.dmg latest.json 2>&1 || true

      - name: Upload build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Poko-mac
          path: |
            Poko-mac.dmg
            Poko.app.tar.gz
            latest.json

      - name: Publish rolling latest-mac release
        if: github.ref == 'refs/heads/poko-server' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="latest-mac"
          SHA_SHORT="${SHA:0:7}"

          # Delete old release so asset URLs stay stable
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          NOTES="Poko v${APP_VERSION} · built from branch \`${REF_NAME}\` @ ${SHA_SHORT}"$'\n\n'"**New download:** [Poko-mac.dmg](https://github.com/${REPO}/releases/download/${TAG}/Poko-mac.dmg)"$'\n\n'"### First-time install (macOS)"$'\n'"Poko is ad-hoc signed but not Apple-notarized yet, so macOS will warn the first time you open it."$'\n\n'"1. Open the DMG and drag **Poko.app** to Applications."$'\n'"2. In Finder, **right-click** (or Control-click) Poko.app → **Open**."$'\n'"3. Click **Open** in the warning dialog. This only happens once."$'\n\n'"If you instead see a **\"Poko.app is damaged and can't be opened\"** error (older downloads only), run this in Terminal:"$'\n\n'"\`\`\`bash"$'\n'"xattr -cr /Applications/Poko.app"$'\n'"\`\`\`"$'\n\n'"**Existing Poko apps will auto-update via the in-app banner** — no need to redownload."$'\n\n'"Built: $(date -u +'%Y-%m-%d %H:%M UTC')"

          gh release create "$TAG" \
            Poko-mac.dmg \
            Poko.app.tar.gz \
            latest.json \
            --title "Poko v${APP_VERSION}" \
            --notes "$NOTES"
