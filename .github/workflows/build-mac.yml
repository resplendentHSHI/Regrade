name: Build Mac App

on:
  push:
    branches: [poko-server, main]
    paths:
      - "client/**"
      - ".github/workflows/build-mac.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon (arm64)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python (for PyInstaller sidecar)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Python sidecar dependencies
        working-directory: client/sidecar
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller gradescopeapi==1.8.0 beautifulsoup4 requests python-dotenv

      - name: Build sidecar binary
        working-directory: client/sidecar
        run: |
          pyinstaller --onefile --name poko-sidecar sidecar_main.py
          mkdir -p ../src-tauri/binaries
          cp dist/poko-sidecar ../src-tauri/binaries/poko-sidecar-aarch64-apple-darwin
          chmod +x ../src-tauri/binaries/poko-sidecar-aarch64-apple-darwin

      - name: Install client deps
        working-directory: client
        run: bun install

      - name: Build Tauri app
        working-directory: client
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          bun run build
          bun run tauri build

      - name: Locate artifacts
        id: artifacts
        run: |
          DMG=$(find client/src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "DMG: $DMG"

      - name: Zip .app as fallback (if .dmg didn't build)
        if: steps.artifacts.outputs.dmg == ''
        run: |
          cd client/src-tauri/target/release/bundle/macos
          zip -r Poko-mac.zip *.app

      - name: Upload build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Poko-mac
          path: |
            client/src-tauri/target/release/bundle/dmg/*.dmg
            client/src-tauri/target/release/bundle/macos/*.zip

      - name: Publish rolling latest-mac release
        if: github.ref == 'refs/heads/poko-server' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          DMG_PATH: ${{ steps.artifacts.outputs.dmg }}
        run: |
          TAG="latest-mac"
          SHA_SHORT="${SHA:0:7}"

          # Pick the artifact — prefer .dmg
          if [ -n "$DMG_PATH" ] && [ -f "$DMG_PATH" ]; then
            cp "$DMG_PATH" "Poko-mac.dmg"
            ASSET="Poko-mac.dmg"
          else
            ZIP=$(find client/src-tauri/target/release/bundle -name "Poko-mac.zip" | head -1)
            cp "$ZIP" "Poko-mac.zip"
            ASSET="Poko-mac.zip"
          fi

          # Delete old release so the asset URL stays stable at /releases/download/latest-mac/$ASSET
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          NOTES="Auto-built from branch \`${REF_NAME}\` @ ${SHA_SHORT}"$'\n\n'"**Download:** [${ASSET}](https://github.com/${REPO}/releases/download/${TAG}/${ASSET})"$'\n\n'"Built: $(date -u +'%Y-%m-%d %H:%M UTC')"

          gh release create "$TAG" "$ASSET" \
            --title "Latest macOS Build" \
            --notes "$NOTES"
